<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Belimaa Login</title>
  <meta name="description" content="Login or sign up to Belimaa with a simple mobile and password form.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      font-family: var(--font-body);
      color: var(--ink);
      background:
        radial-gradient(circle at top left, rgba(42,127,186,0.12), transparent 26%),
        radial-gradient(circle at bottom right, rgba(79,181,16,0.10), transparent 30%),
        var(--surface);
    }

    .login-page {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 20px;
    }

    .login-shell {
      width: 100%;
      max-width: 430px;
    }

    .login-back {
      display: inline-flex;
      margin-bottom: 14px;
      text-decoration: none;
      color: var(--blue-deep);
      font-weight: 700;
      font-size: 0.92rem;
    }

    .login-box {
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 28px 24px;
      box-shadow: var(--shadow-md);
    }

    .login-brand {
      text-align: center;
      margin-bottom: 22px;
    }

    .login-brand .nav-logo {
      justify-content: center;
      align-items: center;
      margin-bottom: 10px;
    }

    .login-brand .nav-logo-text {
      align-items: center;
    }

    .login-brand .nav-logo-tagline {
      color: var(--ink3);
    }

    .login-brand p {
      margin: 8px 0 0;
      color: var(--ink2);
      font-size: 0.9rem;
    }

    .login-tabs {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 18px;
    }

    .login-tab {
      min-height: 46px;
      border: 1px solid var(--border);
      background: #fff;
      color: var(--blue-deep);
      border-radius: var(--radius-sm);
      font-weight: 700;
      cursor: pointer;
    }

    .login-tab.active {
      background: var(--gradient-btn);
      color: #fff;
      border-color: transparent;
    }

    .login-note {
      padding: 11px 12px;
      border-radius: var(--radius-sm);
      background: var(--gradient-card);
      border: 1px solid var(--border);
      color: var(--ink2);
      font-size: 0.84rem;
      line-height: 1.55;
      margin-bottom: 16px;
    }

    .login-form {
      display: grid;
      gap: 14px;
    }

    .login-field {
      display: grid;
      gap: 7px;
    }

    .login-field label {
      font-size: 0.86rem;
      font-weight: 700;
      color: var(--ink);
    }

    .login-field input {
      min-height: 48px;
      border-radius: var(--radius-sm);
      border: 1px solid var(--border);
      padding: 0 14px;
      font-size: 0.95rem;
      background: #fff;
      color: var(--ink);
    }

    .login-submit {
      min-height: 50px;
      border: none;
      border-radius: var(--radius-sm);
      background: var(--gradient-btn);
      color: #fff;
      font-weight: 800;
      font-size: 0.98rem;
      cursor: pointer;
      box-shadow: 0 4px 18px rgba(42,127,186,0.35);
    }

    .login-links {
      margin-top: 14px;
      text-align: center;
      font-size: 0.9rem;
      color: var(--ink2);
    }

    .login-links button {
      border: none;
      background: none;
      color: var(--blue-deep);
      font-weight: 800;
      cursor: pointer;
      padding: 0;
    }

    @media (max-width: 520px) {
      .login-page {
        padding: 14px;
      }

      .login-box {
        padding: 24px 18px;
        border-radius: var(--radius-md);
      }
    }
  </style>
</head>
<body>
  <div class="login-page">
    <div class="login-shell">
      <a class="login-back" href="index.html">Back to Store</a>

      <div class="login-box">
        <div class="login-brand">
          <a href="index.html" class="nav-logo">
            <div class="nav-logo-mark">Om</div>
            <div class="nav-logo-text">
              <div class="nav-logo-brand"><span class="b">Beli</span><span class="g">maa</span></div>
              <div class="nav-logo-tagline">&#x0938;&#x094D;&#x0935;&#x092A;&#x094D;&#x0928;&#x093E;&#x0924;&#x094D; &#x0938;&#x0924;&#x094D;&#x092F;&#x0902;&#x0964;</div>
            </div>
          </a>
          <p id="login-subtitle">Login with mobile number and password</p>
        </div>

        <div class="login-tabs">
          <button type="button" class="login-tab active" id="tab-login">Login</button>
          <button type="button" class="login-tab" id="tab-signup">Sign Up</button>
        </div>

        <div class="login-note" id="login-note">Use your mobile number and password for quick access to Belimaa.</div>

        <form class="login-form" id="login-form">
          <div class="login-field" id="field-name" style="display:none;">
            <label for="auth-name">Full Name</label>
            <input id="auth-name" type="text" placeholder="Enter your full name">
          </div>

          <div class="login-field">
            <label for="auth-phone">Mobile Number</label>
            <input id="auth-phone" type="tel" placeholder="Enter mobile number">
          </div>

          <div class="login-field">
            <label for="auth-password">Password</label>
            <input id="auth-password" type="password" placeholder="Enter password">
          </div>

          <button class="login-submit" type="submit" id="submit-btn">Login to Belimaa</button>
        </form>

        <div class="login-links" id="login-links">
          New to Belimaa? <button type="button" id="switch-action">Create account</button>
        </div>
      </div>
    </div>
  </div>

  <div id="toast"></div>
  <script src="js/shared.js"></script>
  <script>
    const loginState = {
      mode: 'login'
    };

    const params = new URLSearchParams(window.location.search);
    if (params.get('mode') === 'signup') loginState.mode = 'signup';

    const refs = {
      subtitle: document.getElementById('login-subtitle'),
      note: document.getElementById('login-note'),
      form: document.getElementById('login-form'),
      submit: document.getElementById('submit-btn'),
      tabLogin: document.getElementById('tab-login'),
      tabSignup: document.getElementById('tab-signup'),
      fieldName: document.getElementById('field-name'),
      links: document.getElementById('login-links')
    };

    function renderLoginState() {
      const isSignup = loginState.mode === 'signup';
      refs.tabLogin.classList.toggle('active', !isSignup);
      refs.tabSignup.classList.toggle('active', isSignup);
      refs.fieldName.style.display = isSignup ? 'grid' : 'none';

      refs.subtitle.textContent = isSignup
        ? 'Create account with mobile number and password'
        : 'Login with mobile number and password';
      refs.note.textContent = isSignup
        ? 'Sign up in a simple way using your name, mobile number and password.'
        : 'Use your mobile number and password for quick access to Belimaa.';
      refs.submit.textContent = isSignup ? 'Create Belimaa Account' : 'Login to Belimaa';

      refs.links.innerHTML = isSignup
        ? 'Already have an account? <button type="button" id="switch-action">Login</button>'
        : 'New to Belimaa? <button type="button" id="switch-action">Create account</button>';

      document.getElementById('switch-action').addEventListener('click', () => {
        loginState.mode = isSignup ? 'login' : 'signup';
        renderLoginState();
      });
    }

    refs.tabLogin.addEventListener('click', () => {
      loginState.mode = 'login';
      renderLoginState();
    });

    refs.tabSignup.addEventListener('click', () => {
      loginState.mode = 'signup';
      renderLoginState();
    });

    refs.form.addEventListener('submit', async (event) => {
      event.preventDefault();
      refs.submit.disabled = true;

      const phone = document.getElementById('auth-phone').value.trim();
      const password = document.getElementById('auth-password').value;
      const email = phone ? `${phone.replace(/\D/g, '')}@belimaa.local` : '';

      try {
        if (loginState.mode === 'signup') {
          await window.Auth.register({
            name: document.getElementById('auth-name').value.trim(),
            email,
            password
          });
          showToast('Account created successfully', 'success');
        } else {
          await window.Auth.login({
            email,
            password
          });
          showToast('Logged in successfully', 'success');
        }
        window.location.href = 'index.html';
      } catch (error) {
        showToast(error.message || 'Authentication failed', 'error');
      } finally {
        refs.submit.disabled = false;
      }
    });

    renderLoginState();
  </script>
</body>
</html>
